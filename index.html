<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e3b2c">
  <title>🕊️ Observatoire du Loriot – Centre‑Val de Loire</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#0d1f16; color:#f4f1e1; height:100vh; overflow:hidden; }
    #app { display:flex; flex-direction:column; height:100%; }
    header {
      background:linear-gradient(90deg,#1f3b2c,#143621);
      padding:10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:8px;
      border-bottom:2px solid #3e5d3e;
    }
    .title { font-weight:700; font-size:1.1rem; display:flex; align-items:center; gap:6px; }
    .tools { display:flex; gap:6px; flex-wrap:wrap; }
    .tool-btn {
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      color:#f4f1e1;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:0.8rem;
      backdrop-filter:blur(5px);
      display:flex;
      align-items:center;
      gap:4px;
    }
    .tool-btn.active { background:#f5d742; color:#1a2e1a; border-color:#f5d742; }
    #map-container { flex:1; position:relative; }
    #map { width:100%; height:100%; background:#2a4a34; }
    .fab-container {
      position:absolute;
      bottom:20px;
      right:20px;
      z-index:500;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .fab {
      width:50px; height:50px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.3);
      background:rgba(20,30,20,0.85);
      color:#f4f1e1;
      font-size:1.3rem;
      cursor:pointer;
      backdrop-filter:blur(10px);
      box-shadow:0 4px 15px rgba(0,0,0,0.5);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .fab.active { background:#c0392b; border-color:#ff6b6b; }
    #drawing-hint {
      position:absolute;
      top:15px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      color:#f5d742;
      padding:6px 18px;
      border-radius:20px;
      font-weight:600;
      font-size:0.85rem;
      z-index:400;
      pointer-events:none;
      opacity:0;
      transition:0.3s;
    }
    #drawing-hint.show { opacity:1; }
    .toast {
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#000000cc;
      color:#f5d742;
      padding:8px 20px;
      border-radius:20px;
      font-size:0.9rem;
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:0.3s;
    }
    .toast.show { opacity:1; }
    .panel {
      position:absolute;
      top:0; right:0;
      width:85%; max-width:380px;
      height:100%;
      background:rgba(15,25,15,0.95);
      backdrop-filter:blur(20px);
      z-index:600;
      transform:translateX(100%);
      transition:0.3s;
      display:flex;
      flex-direction:column;
      border-left:1px solid rgba(255,255,255,0.2);
    }
    .panel.open { transform:translateX(0); }
    .panel-header {
      padding:14px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.2);
    }
    .panel-list { flex:1; overflow-y:auto; padding:10px; }
    .obs-item {
      background:rgba(255,255,255,0.08);
      border-radius:10px;
      padding:12px;
      margin-bottom:8px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid rgba(255,255,255,0.15);
    }
    .sheet {
      position:absolute;
      bottom:0; left:0; right:0;
      background:rgba(18,30,18,0.95);
      backdrop-filter:blur(20px);
      border-radius:24px 24px 0 0;
      box-shadow:0 -5px 25px rgba(0,0,0,0.6);
      z-index:550;
      transform:translateY(100%);
      transition:0.3s;
      max-height:65vh;
      display:flex;
      flex-direction:column;
      border-top:1px solid rgba(255,255,255,0.2);
    }
    .sheet.open { transform:translateY(0); }
    .sheet-handle {
      width:35px; height:5px;
      background:#5a7a4a;
      border-radius:10px;
      margin:12px auto 6px;
    }
    .sheet-content { padding:0 16px 16px; overflow-y:auto; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; color:#b9cfa8; }
    select, input[type="text"], input[type="number"], input[type="time"] {
      width:100%;
      padding:10px;
      border-radius:10px;
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.3);
      color:#fff;
      font-size:0.9rem;
    }
    .weather-row { display:flex; gap:8px; }
    .weather-btn {
      flex:1;
      padding:8px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:10px;
      text-align:center;
      font-size:1.4rem;
      cursor:pointer;
    }
    .weather-btn.selected { border-color:#f5d742; background:rgba(245,215,66,0.2); box-shadow:0 0 12px #f5d742; }
    .photo-area { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .photo-thumb { width:55px; height:55px; object-fit:cover; border-radius:8px; border:1px solid rgba(255,255,255,0.3); }
    .photo-wrap { position:relative; }
    .photo-wrap .del {
      position:absolute;
      top:-6px; right:-6px;
      background:#e74c3c;
      color:white;
      border:none;
      width:20px; height:20px;
      border-radius:50%;
      font-size:0.65rem;
      cursor:pointer;
    }
    .btn-primary { background:#f5d742; color:#1a2e1a; border:none; padding:12px; border-radius:10px; font-weight:700; width:100%; cursor:pointer; margin-top:6px; }
    .btn-danger { background:#c0392b; color:white; border:none; padding:12px; border-radius:10px; width:100%; margin-top:6px; cursor:pointer; display:none; }
    .btn-danger.show { display:block; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="title">🕊️ Loriot d'Europe</span>
      <span id="obs-count">0 zone(s)</span>
      <div class="tools">
        <button class="tool-btn" id="btn-download" title="Progression du téléchargement">📥 Prêt</button>
        <button class="tool-btn" id="btn-satellite">🛰️ Satellite</button>
        <button class="tool-btn" id="btn-reload">🔄</button>
        <button class="tool-btn" id="btn-sync">📡 Sync</button>
        <button class="tool-btn" id="btn-geoloc">📍</button>
      </div>
    </header>
    <div id="map-container">
      <div id="map"></div>
      <div id="drawing-hint">🎯 Cliquez pour placer un cercle (37,5 m)</div>
      <div class="fab-container">
        <button class="fab" id="fab-draw">⭕</button>
        <button class="fab" id="fab-list">📋</button>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-header">
        <span>📋 Zones</span>
        <button id="btn-close-panel" style="background:none;border:none;color:white;font-size:1.2rem;">✕</button>
      </div>
      <div class="panel-list" id="panel-list"><p style="color:#aaa;text-align:center;padding:20px;">Aucune zone</p></div>
    </div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <div class="form-group">
          <label>🕒 Heure</label>
          <input type="time" id="obs-time" step="60">
        </div>
        <div class="form-group">
          <label>🐦 Nombre d'individus</label>
          <input type="number" id="nb-individus" min="0" value="0" placeholder="Ex: 2">
        </div>
        <div class="form-group">
          <label>🌿 Indice de nidification</label>
          <select id="nesting-select">
            <option value="">-- Choisir --</option>
            <option value="faible">Chant seul (Faible)</option>
            <option value="moyen">Cris d'alarme (Moyen)</option>
            <option value="fort">Transport/Couple (Fort)</option>
          </select>
        </div>
        <div class="form-group">
          <label>🌤️ Météo</label>
          <div class="weather-row" id="weather-row">
            <button class="weather-btn" data-weather="soleil">☀️</button>
            <button class="weather-btn" data-weather="nuage">☁️</button>
            <button class="weather-btn" data-weather="pluie">🌧️</button>
          </div>
        </div>
        <div class="form-group">
          <label>📸 Photos</label>
          <div class="photo-area" id="photo-area">
            <button id="btn-add-photo" class="tool-btn" style="font-size:1.4rem;">+</button>
          </div>
          <input type="file" id="photo-input" accept="image/*" capture="environment" hidden>
        </div>
        <button class="btn-primary" id="btn-save">💾 Enregistrer</button>
        <button class="btn-danger" id="btn-delete">🗑️ Supprimer</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ========== SERVICE WORKER (hors‑ligne) ==========
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE_NAME = 'loriot-autocache-v1';
          const ASSETS = [
            '/',
            'index.html',
            'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
            'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
          ];
          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS).then(() => self.skipWaiting()))
            );
          });
          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))))
              .then(() => self.clients.claim())
            );
          });
          self.addEventListener('fetch', e => {
            if (e.request.method !== 'GET') return;
            const url = new URL(e.request.url);
            if (url.hostname === 'tile.openstreetmap.org' || url.hostname === 'server.arcgisonline.com') {
              e.respondWith(
                caches.match(e.request).then(cached => {
                  return fetch(e.request).then(response => {
                    if (response && response.status === 200) {
                      const clone = response.clone();
                      caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
                    }
                    return response;
                  }).catch(() => cached);
                })
              );
            } else {
              e.respondWith(
                caches.match(e.request).then(cached => {
                  return fetch(e.request).then(response => {
                    if (response && response.status === 200) {
                      const clone = response.clone();
                      caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
                    }
                    return response;
                  }).catch(() => cached);
                })
              );
            }
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(() => console.log('✅ Service Worker enregistré'))
          .catch(err => console.warn('SW non enregistré', err));
      });
    }

    // ========== APPLICATION ==========
    (function() {
      const STORAGE = 'loriot_data_autocache';
      const DEFAULT_RADIUS = 37.5;
      const CENTER = [47.0, 1.5]; // Centre-Val de Loire
      const DEFAULT_ZOOM = 8;
      const MAX_ZOOM = 18; // zoom max pour le préchargement

      let observations = JSON.parse(localStorage.getItem(STORAGE) || '[]');
      let syncQueue = JSON.parse(localStorage.getItem('loriot_sync_autocache') || '[]');
      let map, standardLayer, satelliteLayer, currentLayer = 'standard';
      let circles = {};
      let drawingMode = false;
      let currentEditId = null;
      let tempPhotos = [];
      let selectedWeather = null;
      let downloadProgress = { total: 0, loaded: 0 };

      const $map = document.getElementById('map');
      const $hint = document.getElementById('drawing-hint');
      const $fabDraw = document.getElementById('fab-draw');
      const $fabList = document.getElementById('fab-list');
      const $panel = document.getElementById('panel');
      const $panelList = document.getElementById('panel-list');
      const $sheet = document.getElementById('sheet');
      const $obsTime = document.getElementById('obs-time');
      const $nbIndividus = document.getElementById('nb-individus');
      const $nestingSelect = document.getElementById('nesting-select');
      const $weatherRow = document.getElementById('weather-row');
      const $photoArea = document.getElementById('photo-area');
      const $photoInput = document.getElementById('photo-input');
      const $btnAddPhoto = document.getElementById('btn-add-photo');
      const $btnSave = document.getElementById('btn-save');
      const $btnDelete = document.getElementById('btn-delete');
      const $obsCount = document.getElementById('obs-count');
      const $toast = document.getElementById('toast');
      const $btnDownload = document.getElementById('btn-download');
      const $btnSatellite = document.getElementById('btn-satellite');
      const $btnReload = document.getElementById('btn-reload');
      const $btnSync = document.getElementById('btn-sync');
      const $btnGeoloc = document.getElementById('btn-geoloc');
      const $btnClosePanel = document.getElementById('btn-close-panel');

      function toast(msg) {
        $toast.textContent = msg;
        $toast.classList.add('show');
        clearTimeout($toast._t);
        $toast._t = setTimeout(() => $toast.classList.remove('show'), 2500);
      }

      function save() {
        localStorage.setItem(STORAGE, JSON.stringify(observations));
        localStorage.setItem('loriot_sync_autocache', JSON.stringify(syncQueue));
      }

      function getColor(index) {
        switch(index) {
          case 'faible': return { fill: '#7CB342', stroke: '#558B2F' };
          case 'moyen': return { fill: '#E67E22', stroke: '#BF5F0A' };
          case 'fort': return { fill: '#C0392B', stroke: '#922B21' };
          default: return { fill: '#f5d742', stroke: '#d4a820' };
        }
      }

      function getCurrentTime() {
        const now = new Date();
        return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      }

      // ----- TÉLÉCHARGEMENT AUTOMATIQUE DES TUILES -----
      async function autoDownloadTiles() {
        if (!navigator.onLine) {
          $btnDownload.textContent = '📴 Hors ligne';
          return;
        }
        const bounds = L.latLngBounds(
          [43.5, -1.5], // Sud-Ouest de la région Centre-Val de Loire (élargi)
          [50.5, 4.5]   // Nord-Est
        );
        const tileUrls = [];
        const baseUrl = currentLayer === 'satellite'
          ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
          : 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';

        // Génère les URL pour les niveaux de zoom de DEFAULT_ZOOM à MAX_ZOOM
        for (let z = DEFAULT_ZOOM; z <= MAX_ZOOM; z++) {
          const nw = map.project(bounds.getNorthWest(), z);
          const se = map.project(bounds.getSouthEast(), z);
          const tileSize = 256;
          const minX = Math.floor(nw.x / tileSize);
          const maxX = Math.floor(se.x / tileSize);
          const minY = Math.floor(nw.y / tileSize);
          const maxY = Math.floor(se.y / tileSize);

          for (let x = minX; x <= maxX; x++) {
            for (let y = minY; y <= maxY; y++) {
              tileUrls.push(baseUrl.replace('{z}', z).replace('{x}', x).replace('{y}', y));
            }
          }
        }

        downloadProgress.total = tileUrls.length;
        downloadProgress.loaded = 0;
        $btnDownload.textContent = `📥 0/${downloadProgress.total}`;
        toast('⚡ Téléchargement automatique des tuiles...');

        const cache = await caches.open('loriot-autocache-v1');
        for (const url of tileUrls) {
          try {
            const response = await fetch(url);
            if (response.ok) {
              cache.put(url, response.clone());
            }
            downloadProgress.loaded++;
            // Mise à jour toutes les 10 tuiles pour ne pas ralentir
            if (downloadProgress.loaded % 10 === 0 || downloadProgress.loaded === downloadProgress.total) {
              $btnDownload.textContent = `📥 ${downloadProgress.loaded}/${downloadProgress.total}`;
            }
          } catch (e) {}
        }
        $btnDownload.textContent = '✅ Prêt';
        toast('✅ Carte enregistrée pour le hors-ligne');
      }

      function initMap() {
        map = L.map('map', { center: CENTER, zoom: DEFAULT_ZOOM });
        standardLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap'
        });
        satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19,
          attribution: '&copy; Esri, Maxar, Earthstar Geographics'
        });
        standardLayer.addTo(map);
        updateSatelliteBtn();

        map.on('click', e => {
          if (!drawingMode) return;
          const obs = {
            id: 'obs_'+Date.now(),
            lat: e.latlng.lat,
            lng: e.latlng.lng,
            radius: DEFAULT_RADIUS,
            time: getCurrentTime(),
            nbIndividus: 0,
            nestingIndex: '',
            weather: null,
            photos: [],
            timestamp: Date.now()
          };
          observations.push(obs);
          syncQueue.push(obs.id);
          save();
          drawCircle(obs);
          stopDrawing();
          openSheet(obs.id);
          toast('✅ Zone créée');
        });

        rebuildAllCircles();

        // Lancement du téléchargement automatique après initialisation
        setTimeout(autoDownloadTiles, 1000);
      }

      function updateSatelliteBtn() {
        $btnSatellite.textContent = currentLayer === 'satellite' ? '🛰️ Satellite' : '🗺️ Standard';
        $btnSatellite.classList.toggle('active', currentLayer === 'satellite');
      }

      function drawCircle(obs) {
        const col = getColor(obs.nestingIndex);
        const circle = L.circle([obs.lat, obs.lng], {
          radius: obs.radius,
          color: col.stroke,
          fillColor: col.fill,
          fillOpacity: 0.35,
          weight: 2.5
        }).addTo(map);
        const timeStr = obs.time ? `🕒 ${obs.time}` : '';
        const nbStr = obs.nbIndividus ? `🐦 ${obs.nbIndividus}` : '';
        circle.bindPopup(`<b>Zone</b><br>${obs.nestingIndex || 'Nouveau'}<br>${timeStr} ${nbStr}`);
        circle.on('click', () => { if(!drawingMode) openSheet(obs.id); });
        circles[obs.id] = circle;
      }

      function rebuildAllCircles() {
        Object.values(circles).forEach(c => map.removeLayer(c));
        circles = {};
        observations.forEach(drawCircle);
        updateCount();
        refreshPanel();
      }

      function startDrawing() {
        drawingMode = true;
        $fabDraw.classList.add('active');
        $hint.classList.add('show');
        closeSheet();
        closePanel();
      }

      function stopDrawing() {
        drawingMode = false;
        $fabDraw.classList.remove('active');
        $hint.classList.remove('show');
      }

      function openSheet(id) {
        currentEditId = id;
        const obs = observations.find(o => o.id === id);
        if (!obs) return;
        $obsTime.value = obs.time || '';
        $nbIndividus.value = obs.nbIndividus || 0;
        $nestingSelect.value = obs.nestingIndex;
        selectedWeather = obs.weather;
        tempPhotos = [...obs.photos];
        updateWeatherButtons();
        renderPhotos();
        $btnDelete.classList.add('show');
        $sheet.classList.add('open');
        map.setView([obs.lat, obs.lng], 15);
      }

      function closeSheet() {
        $sheet.classList.remove('open');
        currentEditId = null;
        $btnDelete.classList.remove('show');
      }

      function updateWeatherButtons() {
        document.querySelectorAll('#weather-row .weather-btn').forEach(b => {
          b.classList.toggle('selected', b.dataset.weather === selectedWeather);
        });
      }

      function renderPhotos() {
        document.querySelectorAll('.photo-wrap').forEach(el => el.remove());
        tempPhotos.forEach((b64, idx) => {
          const wrap = document.createElement('div');
          wrap.className = 'photo-wrap';
          const img = document.createElement('img');
          img.className = 'photo-thumb';
          img.src = b64;
          const del = document.createElement('button');
          del.className = 'del';
          del.textContent = '✕';
          del.addEventListener('click', e => {
            e.stopPropagation();
            tempPhotos.splice(idx, 1);
            renderPhotos();
          });
          wrap.appendChild(img);
          wrap.appendChild(del);
          $photoArea.insertBefore(wrap, $btnAddPhoto);
        });
      }

      function refreshPanel() {
        $panelList.innerHTML = observations.length === 0
          ? '<p style="color:#aaa;text-align:center;padding:20px;">Aucune zone</p>'
          : observations.map(o => {
              const timeStr = o.time ? `🕒${o.time}` : '';
              const nbText = o.nbIndividus ? `🐦${o.nbIndividus}` : '';
              return `<div class="obs-item" data-id="${o.id}">
                <span>📍</span>
                <span>${o.nestingIndex ? getNestingLabel(o.nestingIndex) : 'Nouveau'} · ${timeStr} ${nbText} · ${new Date(o.timestamp).toLocaleDateString()}</span>
              </div>`;
            }).join('');
        document.querySelectorAll('.obs-item').forEach(item => {
          item.addEventListener('click', () => {
            const id = item.dataset.id;
            closePanel();
            const obs = observations.find(o => o.id === id);
            if (obs) map.setView([obs.lat, obs.lng], 15);
            setTimeout(() => openSheet(id), 350);
          });
        });
      }

      function getNestingLabel(val) {
        switch(val) {
          case 'faible': return 'Chant seul';
          case 'moyen': return 'Cris alarme';
          case 'fort': return 'Transport/Couple';
          default: return '';
        }
      }

      function openPanel() { $panel.classList.add('open'); refreshPanel(); }
      function closePanel() { $panel.classList.remove('open'); }
      function updateCount() { $obsCount.textContent = observations.length + ' zone(s)'; }

      function syncNow() {
        if (!navigator.onLine) { toast('📡 Hors ligne, synchronisation différée'); return; }
        if (syncQueue.length === 0) { toast('✅ Aucune donnée à synchroniser'); return; }
        console.log('📤 Envoi de', syncQueue.length, 'observations (simulation)');
        setTimeout(() => {
          syncQueue = [];
          save();
          toast('✅ Synchronisation terminée');
        }, 1000);
      }

      $fabDraw.addEventListener('click', () => drawingMode ? stopDrawing() : startDrawing());
      $fabList.addEventListener('click', () => $panel.classList.contains('open') ? closePanel() : openPanel());
      $btnClosePanel.addEventListener('click', closePanel);
      $btnSave.addEventListener('click', () => {
        if (!currentEditId) return;
        const obs = observations.find(o => o.id === currentEditId);
        obs.time = $obsTime.value;
        obs.nbIndividus = parseInt($nbIndividus.value) || 0;
        obs.nestingIndex = $nestingSelect.value;
        obs.weather = selectedWeather;
        obs.photos = [...tempPhotos];
        if (!syncQueue.includes(obs.id)) syncQueue.push(obs.id);
        save();
        if (circles[obs.id]) { map.removeLayer(circles[obs.id]); drawCircle(obs); }
        updateCount();
        refreshPanel();
        closeSheet();
        toast('💾 Enregistré');
      });
      $btnDelete.addEventListener('click', () => {
        if (!currentEditId || !confirm('Supprimer cette zone ?')) return;
        observations = observations.filter(o => o.id !== currentEditId);
        syncQueue = syncQueue.filter(id => id !== currentEditId);
        save();
        if (circles[currentEditId]) map.removeLayer(circles[currentEditId]);
        updateCount();
        refreshPanel();
        closeSheet();
        toast('🗑️ Supprimé');
      });
      $weatherRow.addEventListener('click', e => {
        const btn = e.target.closest('[data-weather]');
        if (!btn) return;
        selectedWeather = (selectedWeather === btn.dataset.weather) ? null : btn.dataset.weather;
        updateWeatherButtons();
      });
      $btnAddPhoto.addEventListener('click', () => $photoInput.click());
      $photoInput.addEventListener('change', () => {
        const file = $photoInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxDim = 600;
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              const ratio = Math.min(maxDim/w, maxDim/h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            tempPhotos.push(canvas.toDataURL('image/jpeg', 0.6));
            renderPhotos();
            toast('📸 Photo ajoutée');
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
        $photoInput.value = '';
      });
      $btnSatellite.addEventListener('click', () => {
        if (currentLayer === 'standard') {
          map.removeLayer(standardLayer);
          map.addLayer(satelliteLayer);
          currentLayer = 'satellite';
        } else {
          map.removeLayer(satelliteLayer);
          map.addLayer(standardLayer);
          currentLayer = 'standard';
        }
        updateSatelliteBtn();
        toast(currentLayer === 'satellite' ? '🛰️ Vue satellite' : '🗺️ Vue standard');
      });
      $btnReload.addEventListener('click', () => {
        const center = map.getCenter();
        const zoom = map.getZoom();
        map.setView(center, zoom);
        toast('🔄 Tuiles rechargées');
      });
      $btnSync.addEventListener('click', syncNow);
      $btnGeoloc.addEventListener('click', () => {
        if (!navigator.geolocation) { toast('📍 Géolocalisation non supportée'); return; }
        navigator.geolocation.getCurrentPosition(
          pos => map.setView([pos.coords.latitude, pos.coords.longitude], 16),
          () => toast('📍 Impossible de vous localiser')
        );
      });
      // Le bouton de téléchargement manuel peut relancer le processus
      $btnDownload.addEventListener('click', autoDownloadTiles);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { stopDrawing(); closeSheet(); closePanel(); }
      });

      initMap();
      updateCount();
      refreshPanel();
    })();
  </script>
</body>
</html>
