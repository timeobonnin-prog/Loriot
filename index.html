<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a2e1a">
  <title>🕊️ Loriot d'Europe – Observatoire</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0d1f12;
      --surface: rgba(20, 35, 20, 0.9);
      --accent: #f5d742;
      --accent-dark: #c9a820;
      --text: #f0f0d0;
      --text-dim: #9aba8a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh; width: 100vw;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    /* Barre supérieure */
    header {
      background: linear-gradient(135deg, #1e3b2c, #14221a);
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
      min-height: 54px;
    }
    .title {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .badge {
      background: rgba(255,255,255,0.12);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tool-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tool-btn {
      background: var(--surface);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: 0.2s;
    }
    .tool-btn:active { transform: scale(0.96); }
    .tool-btn.active {
      background: var(--accent);
      color: #1a2e1a;
      border-color: var(--accent);
    }

    /* Carte */
    #map-container {
      flex: 1;
      position: relative;
    }
    #map {
      width: 100%; height: 100%;
      background: #2a4a34;
    }

    /* Indicateur de dessin */
    #drawing-hint {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: var(--accent);
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: 0.2s;
      backdrop-filter: blur(5px);
    }
    #drawing-hint.show { opacity: 1; }

    /* FABs */
    .fab-container {
      position: absolute;
      bottom: 20px;
      right: 16px;
      z-index: 600;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .fab {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--surface);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--text);
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
      transition: 0.2s;
    }
    .fab.active {
      background: #c0392b;
      border-color: #ff6b6b;
      box-shadow: 0 0 18px #ff6b6b;
    }

    /* Panneau latéral */
    .panel {
      position: absolute;
      top: 0; right: 0;
      width: 85%; max-width: 360px;
      height: 100%;
      background: var(--surface);
      backdrop-filter: blur(25px);
      z-index: 700;
      transform: translateX(100%);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.15);
    }
    .panel.open { transform: translateX(0); }
    .panel-header {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
    }
    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .obs-item {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }

    /* Fiche (bottom sheet) */
    .sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      backdrop-filter: blur(25px);
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.7);
      z-index: 650;
      transform: translateY(100%);
      transition: 0.3s;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 5px;
      background: #4a6a4a;
      border-radius: 10px;
      margin: 12px auto 8px;
    }
    .sheet-content {
      padding: 0 18px 18px;
      overflow-y: auto;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
      color: var(--text-dim);
    }
    select, input[type="text"], input[type="number"], input[type="time"] {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 0.9rem;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row .field { flex: 1; min-width: 0; }
    .weather-row {
      display: flex;
      gap: 8px;
    }
    .weather-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      text-align: center;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .weather-btn.selected {
      background: rgba(245,215,66,0.2);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .photo-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      align-items: center;
    }
    .photo-thumb {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .photo-wrap { position: relative; }
    .photo-wrap .del {
      position: absolute;
      top: -7px; right: -7px;
      background: #e74c3c;
      color: white;
      border: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #1a2e1a;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      margin-top: 6px;
      font-size: 1rem;
    }
    .btn-danger {
      background: #c0392b;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-top: 6px;
      cursor: pointer;
      display: none;
      font-weight: 600;
    }
    .btn-danger.show { display: block; }

    /* Menu contextuel (long press / right click) */
    .context-menu {
      position: absolute;
      background: rgba(10, 20, 10, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 6px 0;
      z-index: 800;
      min-width: 130px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
      display: none;
    }
    .context-menu button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #f0f0d0;
      padding: 10px 18px;
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .context-menu button:hover { background: rgba(255,255,255,0.1); }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: var(--accent);
      padding: 10px 22px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="title">🕊️ Loriot d'Europe</span>
      <span class="badge" id="obs-count">0 zone</span>
      <div class="tool-row">
        <button class="tool-btn" id="btn-export">📤</button>
        <button class="tool-btn" id="btn-import">📥</button>
        <button class="tool-btn" id="btn-satellite">🗺️</button>
        <button class="tool-btn" id="btn-reload">🔄</button>
        <button class="tool-btn" id="btn-geoloc">📍</button>
      </div>
    </header>

    <div id="map-container">
      <div id="map"></div>
      <div id="drawing-hint">🎯 Touchez la carte pour placer un cercle</div>
      <div class="fab-container">
        <button class="fab" id="fab-draw">⭕</button>
        <button class="fab" id="fab-list">📋</button>
      </div>
      <!-- Menu contextuel -->
      <div class="context-menu" id="context-menu">
        <button data-action="edit">✏️ Modifier</button>
        <button data-action="delete">🗑️ Supprimer</button>
      </div>
    </div>

    <div class="panel" id="panel">
      <div class="panel-header">
        <span>📋 Toutes les zones</span>
        <button id="btn-close-panel" style="background:none;border:none;color:white;font-size:1.4rem;">✕</button>
      </div>
      <div class="panel-list" id="panel-list"></div>
    </div>

    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <div class="row">
          <div class="field"><label>🕒 Heure</label><input type="time" id="obs-time" step="60"></div>
          <div class="field"><label>🐦 Nb</label><input type="number" id="nb-individus" min="0" value="0"></div>
        </div>
        <div class="row">
          <div class="field"><label>⚥ Sexe</label>
            <select id="sexe-select">
              <option value="">Inconnu</option>
              <option value="mâle">Mâle</option>
              <option value="femelle">Femelle</option>
              <option value="juvénile">Juvénile</option>
            </select>
          </div>
          <div class="field"><label>🌿 Nidification</label>
            <select id="nesting-select">
              <option value="">--</option>
              <option value="faible">Chant seul</option>
              <option value="moyen">Cris alarme</option>
              <option value="fort">Transport/Couple</option>
            </select>
          </div>
        </div>
        <div class="field"><label>📝 Remarque</label><input type="text" id="plumage" placeholder="Plumage, comportement..."></div>
        <div class="field"><label>🌤️ Météo</label>
          <div class="weather-row" id="weather-row">
            <button class="weather-btn" data-weather="soleil">☀️</button>
            <button class="weather-btn" data-weather="nuage">☁️</button>
            <button class="weather-btn" data-weather="pluie">🌧️</button>
          </div>
        </div>
        <div class="field"><label>📸 Photos</label>
          <div class="photo-area" id="photo-area">
            <button id="btn-add-photo" class="tool-btn" style="font-size:1.4rem;">+</button>
          </div>
          <input type="file" id="photo-input" accept="image/*" capture="environment" hidden>
        </div>
        <button class="btn-primary" id="btn-save">💾 Enregistrer</button>
        <button class="btn-danger" id="btn-delete">🗑️ Supprimer</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- Leaflet + Service Worker -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Service Worker pour le hors‑ligne
    (function() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swCode = `
            const CACHE = 'loriot-offline-v2';
            const ASSETS = [
              '/',
              'index.html',
              'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
              'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
            ];
            self.addEventListener('install', e => {
              e.waitUntil(
                caches.open(CACHE).then(cache => cache.addAll(ASSETS).then(() => self.skipWaiting()))
              );
            });
            self.addEventListener('activate', e => {
              e.waitUntil(
                caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
                .then(() => self.clients.claim())
              );
            });
            self.addEventListener('fetch', e => {
              if (e.request.method !== 'GET') return;
              e.respondWith(
                caches.match(e.request).then(cached => {
                  return fetch(e.request).then(response => {
                    if (response && response.status === 200) {
                      const clone = response.clone();
                      caches.open(CACHE).then(cache => cache.put(e.request, clone));
                    }
                    return response;
                  }).catch(() => cached);
                })
              );
            });
          `;
          const blob = new Blob([swCode], { type: 'application/javascript' });
          navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
      }
    })();

    // Application
    (function() {
      const STORAGE_KEY = 'loriot_obs_v2';
      const RADIUS = 35; // mètres
      const CENTER = [47.0, 1.5]; // Centre-Val de Loire
      const ZOOM = 8;

      let observations = [];
      let map, standardLayer, satelliteLayer, currentLayer = 'standard';
      let circles = {};
      let drawingMode = false;
      let currentEditId = null;
      let tempPhotos = [];
      let selectedWeather = null;
      let contextCircleId = null;

      // DOM
      const $ = id => document.getElementById(id);
      const mapEl = $('map');
      const drawingHint = $('drawing-hint');
      const fabDraw = $('fab-draw');
      const fabList = $('fab-list');
      const panel = $('panel');
      const panelList = $('panel-list');
      const sheet = $('sheet');
      const obsTime = $('obs-time');
      const nbIndividus = $('nb-individus');
      const sexeSelect = $('sexe-select');
      const nestingSelect = $('nesting-select');
      const plumageInput = $('plumage');
      const weatherRow = $('weather-row');
      const photoArea = $('photo-area');
      const photoInput = $('photo-input');
      const btnAddPhoto = $('btn-add-photo');
      const btnSave = $('btn-save');
      const btnDelete = $('btn-delete');
      const obsCountBadge = $('obs-count');
      const toastEl = $('toast');
      const contextMenu = $('context-menu');

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2000);
      }

      function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        observations = raw ? JSON.parse(raw) : [];
      }
      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(observations));
      }

      function getColor(index) {
        switch(index) {
          case 'faible': return { fill:'#7CB342', stroke:'#558B2F' };
          case 'moyen': return { fill:'#E67E22', stroke:'#BF5F0A' };
          case 'fort': return { fill:'#C0392B', stroke:'#922B21' };
          default: return { fill:'#f5d742', stroke:'#d4a820' };
        }
      }

      function getCurrentTime() {
        const now = new Date();
        return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      }

      // Téléchargement auto des tuiles (Centre‑Val de Loire)
      async function downloadRegionTiles() {
        const bounds = L.latLngBounds([43.5, -1.5], [50.5, 4.5]);
        const baseUrl = currentLayer === 'satellite' ?
          'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' :
          'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
        const urls = [];
        for (let z = ZOOM; z <= 18; z++) {
          const nw = map.project(bounds.getNorthWest(), z);
          const se = map.project(bounds.getSouthEast(), z);
          const minX = Math.floor(nw.x / 256), maxX = Math.floor(se.x / 256);
          const minY = Math.floor(nw.y / 256), maxY = Math.floor(se.y / 256);
          for (let x = minX; x <= maxX; x++)
            for (let y = minY; y <= maxY; y++)
              urls.push(baseUrl.replace('{z}',z).replace('{x}',x).replace('{y}',y));
        }
        const cache = await caches.open('loriot-offline-v2');
        let done = 0;
        for (const url of urls) {
          try {
            const res = await fetch(url);
            if (res.ok) cache.put(url, res.clone());
          } catch(e) {}
          done++;
          if (done % 200 === 0) toast(`📥 Téléchargement ${done}/${urls.length}`);
        }
        toast('✅ Carte prête pour le hors‑ligne');
      }

      function initMap() {
        map = L.map('map', {
          center: CENTER,
          zoom: ZOOM,
          zoomControl: false, // on rajoute un contrôle plus discret
          attributionControl: false
        });
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        standardLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19
        });
        satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19
        });
        standardLayer.addTo(map);
        updateSatelliteBtn();

        map.on('click', e => {
          if (!drawingMode) return;
          const obs = {
            id: 'obs_'+Date.now(),
            lat: e.latlng.lat,
            lng: e.latlng.lng,
            radius: RADIUS,
            time: getCurrentTime(),
            nbIndividus: 0,
            sexe: '',
            nestingIndex: '',
            plumage: '',
            weather: null,
            photos: [],
            timestamp: Date.now()
          };
          observations.push(obs);
          saveData();
          drawCircle(obs);
        });

        rebuildAllCircles();
        setTimeout(downloadRegionTiles, 2000);
      }

      function updateSatelliteBtn() {
        const btn = $('btn-satellite');
        btn.textContent = currentLayer === 'satellite' ? '🛰️' : '🗺️';
        btn.classList.toggle('active', currentLayer === 'satellite');
      }

      function drawCircle(obs) {
        const col = getColor(obs.nestingIndex);
        const circle = L.circle([obs.lat, obs.lng], {
          radius: obs.radius,
          color: col.stroke,
          fillColor: col.fill,
          fillOpacity: 0.35,
          weight: 2
        }).addTo(map);
        circle.bindPopup(`${obs.nestingIndex||'?'} ${obs.sexe||''} ${obs.time||''}`);
        circle.on('click', () => { if (!drawingMode) openSheet(obs.id); });
        // Menu contextuel pour desktop (clic droit) et mobile (appui long)
        circle.on('contextmenu', e => {
          e.originalEvent.preventDefault();
          showContextMenu(e, obs.id);
        });
        // Long press pour mobile
        let longPressTimer;
        circle.on('mousedown touchstart', () => {
          longPressTimer = setTimeout(() => {
            // Simule un contextmenu sur mobile
            const fakeEvent = { latlng: circle.getLatLng(), originalEvent: { preventDefault: ()=>{} } };
            showContextMenu(fakeEvent, obs.id);
          }, 600);
        });
        circle.on('mouseup touchend touchcancel', () => {
          clearTimeout(longPressTimer);
        });
        circles[obs.id] = circle;
      }

      function showContextMenu(e, obsId) {
        contextCircleId = obsId;
        const pos = map.latLngToContainerPoint(e.latlng);
        contextMenu.style.left = pos.x + 'px';
        contextMenu.style.top = pos.y + 'px';
        contextMenu.style.display = 'block';
        // Cacher après 4 secondes ou clic ailleurs
        clearTimeout(contextMenu._hide);
        contextMenu._hide = setTimeout(() => contextMenu.style.display = 'none', 4000);
      }

      function rebuildAllCircles() {
        Object.values(circles).forEach(c => map.removeLayer(c));
        circles = {};
        observations.forEach(drawCircle);
        updateCount();
        refreshPanel();
      }

      function startDrawing() {
        drawingMode = true;
        fabDraw.classList.add('active');
        drawingHint.classList.add('show');
        closeSheet();
        closePanel();
        contextMenu.style.display = 'none';
      }

      function stopDrawing() {
        drawingMode = false;
        fabDraw.classList.remove('active');
        drawingHint.classList.remove('show');
      }

      function openSheet(id) {
        currentEditId = id;
        const obs = observations.find(o => o.id === id);
        if (!obs) return;
        obsTime.value = obs.time || '';
        nbIndividus.value = obs.nbIndividus || 0;
        sexeSelect.value = obs.sexe || '';
        nestingSelect.value = obs.nestingIndex || '';
        plumageInput.value = obs.plumage || '';
        selectedWeather = obs.weather;
        tempPhotos = [...(obs.photos || [])];
        updateWeatherButtons();
        renderPhotos();
        btnDelete.classList.add('show');
        sheet.classList.add('open');
        map.setView([obs.lat, obs.lng], 16);
      }

      function closeSheet() {
        sheet.classList.remove('open');
        currentEditId = null;
        btnDelete.classList.remove('show');
      }

      function updateWeatherButtons() {
        document.querySelectorAll('#weather-row .weather-btn').forEach(b =>
          b.classList.toggle('selected', b.dataset.weather === selectedWeather));
      }

      function renderPhotos() {
        document.querySelectorAll('.photo-wrap').forEach(e => e.remove());
        tempPhotos.forEach((b64, idx) => {
          const wrap = document.createElement('div'); wrap.className = 'photo-wrap';
          const img = document.createElement('img'); img.className = 'photo-thumb'; img.src = b64;
          const del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
          del.addEventListener('click', e => { e.stopPropagation(); tempPhotos.splice(idx,1); renderPhotos(); });
          wrap.appendChild(img); wrap.appendChild(del);
          photoArea.insertBefore(wrap, btnAddPhoto);
        });
      }

      function refreshPanel() {
        panelList.innerHTML = observations.length === 0 ?
          '<p style="color:var(--text-dim); text-align:center; padding:30px;">Aucune zone</p>' :
          observations.map(o => `
            <div class="obs-item" data-id="${o.id}">
              <span>📍</span>
              <span style="flex:1">${o.nestingIndex?getNestingLabel(o.nestingIndex):'Nv'} · ${o.time||''} · ${o.sexe||''}</span>
            </div>`).join('');
        document.querySelectorAll('.obs-item').forEach(item => {
          item.addEventListener('click', () => {
            const id = item.dataset.id;
            closePanel();
            const obs = observations.find(o => o.id === id);
            if (obs) map.setView([obs.lat, obs.lng], 16);
            setTimeout(() => openSheet(id), 300);
          });
        });
      }

      function getNestingLabel(v) {
        return {faible:'Chant', moyen:'Alarme', fort:'Transport'}[v] || '';
      }

      function openPanel() { panel.classList.add('open'); refreshPanel(); }
      function closePanel() { panel.classList.remove('open'); }
      function updateCount() { obsCountBadge.textContent = observations.length + ' zone(s)'; }

      // Menu contextuel
      contextMenu.addEventListener('click', e => {
        const action = e.target.dataset.action;
        if (!action || !contextCircleId) return;
        if (action === 'edit') openSheet(contextCircleId);
        else if (action === 'delete' && confirm('Supprimer ce cercle ?')) {
          observations = observations.filter(o => o.id !== contextCircleId);
          saveData();
          if (circles[contextCircleId]) map.removeLayer(circles[contextCircleId]);
          rebuildAllCircles();
          toast('🗑️ Cercle supprimé');
        }
        contextMenu.style.display = 'none';
        contextCircleId = null;
      });
      mapEl.addEventListener('click', () => contextMenu.style.display = 'none');

      // Boutons
      $('btn-export').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(observations, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'loriot_obs.json'; a.click();
        toast('📤 Exporté');
      });
      $('btn-import').addEventListener('click', () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
        input.onchange = () => {
          const file = input.files[0];
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const imported = JSON.parse(reader.result);
              if (Array.isArray(imported)) {
                observations = [...observations, ...imported];
                saveData();
                rebuildAllCircles();
                toast('📥 Importé');
              }
            } catch(e) { toast('⚠️ Fichier invalide'); }
          };
          reader.readAsText(file);
        };
        input.click();
      });
      $('btn-satellite').addEventListener('click', () => {
        if (currentLayer === 'standard') {
          map.removeLayer(standardLayer); map.addLayer(satelliteLayer); currentLayer = 'satellite';
        } else {
          map.removeLayer(satelliteLayer); map.addLayer(standardLayer); currentLayer = 'standard';
        }
        updateSatelliteBtn();
      });
      $('btn-reload').addEventListener('click', () => {
        map.setView(map.getCenter(), map.getZoom());
        toast('🔄 Carte rechargée');
      });
      $('btn-geoloc').addEventListener('click', () => {
        navigator.geolocation.getCurrentPosition(
          pos => map.setView([pos.coords.latitude, pos.coords.longitude], 16),
          () => toast('📍 Impossible')
        );
      });

      fabDraw.addEventListener('click', () => drawingMode ? stopDrawing() : startDrawing());
      fabList.addEventListener('click', () => panel.classList.contains('open') ? closePanel() : openPanel());
      $('btn-close-panel').addEventListener('click', closePanel);
      btnSave.addEventListener('click', () => {
        if (!currentEditId) return;
        const obs = observations.find(o => o.id === currentEditId);
        obs.time = obsTime.value;
        obs.nbIndividus = parseInt(nbIndividus.value) || 0;
        obs.sexe = sexeSelect.value;
        obs.nestingIndex = nestingSelect.value;
        obs.plumage = plumageInput.value;
        obs.weather = selectedWeather;
        obs.photos = [...tempPhotos];
        saveData();
        if (circles[obs.id]) { map.removeLayer(circles[obs.id]); drawCircle(obs); }
        updateCount();
        refreshPanel();
        closeSheet();
        toast('💾 Enregistré');
      });
      btnDelete.addEventListener('click', () => {
        if (!currentEditId || !confirm('Supprimer définitivement ?')) return;
        observations = observations.filter(o => o.id !== currentEditId);
        saveData();
        if (circles[currentEditId]) map.removeLayer(circles[currentEditId]);
        rebuildAllCircles();
        closeSheet();
        toast('🗑️ Supprimé');
      });
      weatherRow.addEventListener('click', e => {
        const btn = e.target.closest('[data-weather]');
        if (!btn) return;
        selectedWeather = selectedWeather === btn.dataset.weather ? null : btn.dataset.weather;
        updateWeatherButtons();
      });
      btnAddPhoto.addEventListener('click', () => photoInput.click());
      photoInput.addEventListener('change', () => {
        const file = photoInput.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxDim = 600; let w=img.width, h=img.height;
            if (w>maxDim||h>maxDim) { const r = Math.min(maxDim/w,maxDim/h); w*=r; h*=r; }
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            tempPhotos.push(canvas.toDataURL('image/jpeg',0.6));
            renderPhotos();
            toast('📸 Photo ajoutée');
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
        photoInput.value = '';
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { stopDrawing(); closeSheet(); closePanel(); }
      });

      // Démarrage
      loadData();
      initMap();
      updateCount();
      refreshPanel();
    })();
  </script>
</body>
</html>
